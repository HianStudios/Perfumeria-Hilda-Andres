<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Pro</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* NAVBAR MOBILE */
.sidebar{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:#020617;
  position:sticky;
  top:0;
  z-index:10;
}

.sidebar button{
  flex:1;
  min-width:120px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:13px;
}

/* CONTENIDO */
.main{
  padding:15px;
}

/* CARDS */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#020617;
  color:white;
}

/* BOTONES */
button{
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:6px;
}

button.save{
  background:#00c896;
  color:white;
  font-weight:bold;
}

/* TOOLBAR */
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  background:#020617;
  padding:8px;
  border-radius:8px;
  margin:10px 0;
}

.toolbar button, .toolbar select, .toolbar input{
  background:#1e293b;
  color:white;
  border:none;
  padding:5px;
  border-radius:5px;
  font-size:12px;
}

/* EDITOR */
.editor{
  background:white;
  color:black;
  padding:15px;
  min-height:150px;
  border-radius:8px;
}

/* IMÁGENES */
img{
  width:100% !important;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="mostrar('esencias')">🌸 Esencias</button>
  <button onclick="mostrar('envases')">🧴 Envases</button>
  <button onclick="mostrar('politicas')">📄 Políticas</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="main" id="contenido"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClkqdEQiTeSdQqjdqbQ4nxTrXbuf9_h-0",
  authDomain: "perfumeria-app.firebaseapp.com",
  projectId: "perfumeria-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* SECCIONES */
function mostrar(tipo){
  const cont = document.getElementById("contenido");

  if(tipo === "esencias"){
    cont.innerHTML = `
      <div class="card">
        <h3>Crear Esencia</h3>
        <input id="nombreEsencia" placeholder="Nombre">
        <input id="imgEsencia" placeholder="URL Imagen">
        <button class="save" onclick="crearEsencia()">Guardar</button>
      </div>
      <div id="lista"></div>
    `;
    cargarEsencias();
  }

  if(tipo === "envases"){
    cont.innerHTML = `
      <div class="card">
        <h3>Crear Envase</h3>
        <input id="nombreEnvase" placeholder="Nombre">
        <select id="categoria">
          <option>30ml</option>
          <option>50ml</option>
          <option>100ml</option>
        </select>
        <input id="imgEnvase" placeholder="URL Imagen">
        <input id="precioEnvase" type="number" placeholder="Precio">
        <button class="save" onclick="crearEnvase()">Guardar</button>
      </div>
      <div id="lista"></div>
    `;
    cargarEnvases();
  }

  if(tipo === "politicas"){
    cont.innerHTML = `
      <div class="card">
        <h3>Políticas</h3>
        <input id="titulo" placeholder="Título">
        <div class="toolbar">
          <button onclick="format('bold')">B</button>
          <button onclick="format('italic')">I</button>
          <button onclick="format('underline')">U</button>
        </div>
        <div id="editor" class="editor" contenteditable="true"></div>
        <button class="save" onclick="guardarPolitica()">Guardar</button>
      </div>
      <div id="lista"></div>
    `;
    cargarPoliticas();
  }
}

/* FUNCIONES (igual que tu código) */
function format(cmd){ document.execCommand(cmd,false,null); }

/* ESENCIAS */
async function crearEsencia(){
  await db.collection("esencias").add({
    nombre:nombreEsencia.value,
    imagen:imgEsencia.value
  });
  cargarEsencias();
}

async function cargarEsencias(){
  lista.innerHTML="";
  const snap = await db.collection("esencias").get();
  snap.forEach(doc=>{
    const d = doc.data();
    lista.innerHTML+=`
    <div class="card">
      ${d.nombre}
      <img src="${d.imagen}">
      <button onclick="eliminarEsencia('${doc.id}')">Eliminar</button>
    </div>`;
  });
}

async function eliminarEsencia(id){
  await db.collection("esencias").doc(id).delete();
  cargarEsencias();
}

/* ENVASES */
async function crearEnvase(){
  await db.collection("envases").add({
    nombre:nombreEnvase.value,
    categoria:categoria.value,
    imagen:imgEnvase.value,
    precio:parseFloat(precioEnvase.value)||0
  });
  cargarEnvases();
}

async function cargarEnvases(){
  lista.innerHTML="";
  const snap = await db.collection("envases").get();
  snap.forEach(doc=>{
    const d = doc.data();
    lista.innerHTML+=`
    <div class="card">
      ${d.nombre} - $${d.precio}
      <img src="${d.imagen}">
      <button onclick="eliminarEnvase('${doc.id}')">Eliminar</button>
    </div>`;
  });
}

async function eliminarEnvase(id){
  await db.collection("envases").doc(id).delete();
  cargarEnvases();
}

/* POLITICAS */
let editId=null;

async function guardarPolitica(){
  await db.collection("politicas").add({
    titulo:titulo.value,
    contenido:editor.innerHTML
  });
  cargarPoliticas();
}

async function cargarPoliticas(){
  lista.innerHTML="";
  const snap = await db.collection("politicas").get();
  snap.forEach(doc=>{
    const d = doc.data();
    lista.innerHTML+=`
    <div class="card">
      <b>${d.titulo}</b>
      ${d.contenido}
    </div>`;
  });
}

/* LOGOUT */
function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href="login.html";
  });
}

mostrar("esencias");
</script>

</body>
</html>
