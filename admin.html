<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Pro</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  display:flex;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:rgba(2,6,23,0.9);
  backdrop-filter: blur(10px);
  height:100vh;
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar h2{
  margin-bottom:20px;
  font-size:18px;
  color:#94a3b8;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:12px;
  background:transparent;
  border:none;
  color:#cbd5f5;
  cursor:pointer;
  border-radius:8px;
  text-align:left;
  transition:0.3s;
}

.sidebar button:hover{
  background:#1e293b;
  color:white;
  transform:translateX(5px);
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* CARDS */
.card{
  background:rgba(30,41,59,0.85);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background:#020617;
  color:white;
  outline:none;
  border:1px solid transparent;
  transition:0.2s;
}

input:focus, select:focus{
  border:1px solid #00c896;
}

/* BOTONES */
button{
  margin:5px;
  padding:8px 12px;
  cursor:pointer;
  border:none;
  border-radius:6px;
  transition:0.2s;
}

button:hover{
  opacity:0.85;
}

button.save{
  background:linear-gradient(135deg,#00c896,#00a67d);
  color:white;
  font-weight:bold;
}

/* TOOLBAR */
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
  border:1px solid rgba(255,255,255,0.05);
}

.toolbar button, .toolbar select, .toolbar input{
  background:#1e293b;
  color:white;
  border:none;
  padding:6px 8px;
  border-radius:6px;
}

/* EDITOR */
.editor{
  background:white;
  color:black;
  padding:20px;
  min-height:220px;
  border-radius:10px;
  border:2px solid #e2e8f0;
  font-size:15px;
  line-height:1.6;
}

/* IMAGENES */
img{
  border-radius:8px;
  margin-top:10px;
}

/* SCROLL */
::-webkit-scrollbar{
  width:8px;
}
::-webkit-scrollbar-thumb{
  background:#1e293b;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>ADMIN PANEL</h2>
  <button onclick="mostrar('esencias')">🌸 Esencias</button>
  <button onclick="mostrar('envases')">🧴 Envases</button>
  <button onclick="mostrar('politicas')">📄 Políticas</button>
  <button onclick="logout()">🚪 Cerrar sesión</button>
</div>

<div class="main" id="contenido"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClkqdEQiTeSdQqjdqbQ4nxTrXbuf9_h-0",
  authDomain: "perfumeria-app.firebaseapp.com",
  projectId: "perfumeria-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* CAMBIAR SECCION */
function mostrar(tipo){
  const cont = document.getElementById("contenido");

  if(tipo === "esencias"){
    cont.innerHTML = `
      <div class="card">
        <h2>Crear Esencia</h2>
        <input id="nombreEsencia" placeholder="Nombre">
        <input id="imgEsencia" placeholder="URL Imagen">
        <button class="save" onclick="crearEsencia()">Guardar</button>
      </div>
      <div id="lista"></div>
    `;
    cargarEsencias();
  }

  if(tipo === "envases"){
    cont.innerHTML = `
      <div class="card">
        <h2>Crear Envase</h2>
        <input id="nombreEnvase" placeholder="Nombre">
        <select id="categoria">
          <option>30ml</option>
          <option>50ml</option>
          <option>100ml</option>
        </select>
        <input id="imgEnvase" placeholder="URL Imagen">
        <input id="precioEnvase" type="number" placeholder="Precio">
        <button class="save" onclick="crearEnvase()">Guardar</button>
      </div>
      <div id="lista"></div>
    `;
    cargarEnvases();
  }

  if(tipo === "politicas"){
    cont.innerHTML = `
      <div class="card">
        <h2>Crear / Editar Política</h2>
        <input id="titulo" placeholder="Título" style="font-size:20px;font-weight:bold;">
        <div class="toolbar">
          <select onchange="format('fontName', this.value)">
            <option value="Arial">Arial</option>
            <option value="Verdana">Verdana</option>
            <option value="Times New Roman">Times</option>
          </select>

          <select onchange="format('fontSize', this.value)">
            <option value="3">Normal</option>
            <option value="4">Medio</option>
            <option value="5">Grande</option>
          </select>

          <input type="color" onchange="format('foreColor', this.value)">
          <button onclick="format('bold')">B</button>
          <button onclick="format('italic')">I</button>
          <button onclick="format('underline')">U</button>
          <button onclick="format('justifyLeft')">⬅</button>
          <button onclick="format('justifyCenter')">⬍</button>
          <button onclick="format('justifyRight')">➡</button>
          <button onclick="format('justifyFull')">☰</button>
          <button onclick="format('insertUnorderedList')">• Lista</button>
          <button onclick="insertarImagen()">🖼</button>
          <input type="number" id="imgWidth" placeholder="px" style="width:60px;">
          <button onclick="cambiarTamanoImagen()">OK</button>
        </div>
        <div id="editor" class="editor" contenteditable="true"></div>
        <button class="save" onclick="guardarPolitica()">Guardar</button>
      </div>
      <div id="lista"></div>
    `;
    cargarPoliticas();
  }
}

/* EDITOR */
function format(cmd, val=null){
  document.execCommand(cmd,false,val);
}

function insertarImagen(){
  const url = prompt("URL imagen:");
  if(url){
    const img = document.createElement("img");
    img.src = url;
    img.style.width = "150px";
    document.getElementById("editor").appendChild(img);
  }
}

function cambiarTamanoImagen(){
  const width = document.getElementById("imgWidth").value;
  const sel = window.getSelection();
  const node = sel.anchorNode.parentNode;
  if(node.tagName === "IMG"){
    node.style.width = width + "px";
  }
}

/* ESENCIAS */
async function crearEsencia(){
  await db.collection("esencias").add({
    nombre: nombreEsencia.value,
    imagen: imgEsencia.value
  });
  cargarEsencias();
}

async function cargarEsencias(){
  lista.innerHTML="";
  const snap = await db.collection("esencias").get();
  snap.forEach(doc=>{
    const d = doc.data();
    lista.innerHTML+=`
    <div class="card">
      ${d.nombre}<br>
      <img src="${d.imagen}" width="100"><br>
      <button onclick="editarEsencia('${doc.id}','${d.nombre}','${d.imagen}')">Editar</button>
      <button onclick="eliminarEsencia('${doc.id}')">Eliminar</button>
    </div>`;
  });
}

async function editarEsencia(id,n,i){
  const nn = prompt("Nombre:",n);
  const ii = prompt("Imagen:",i);
  if(nn && ii){
    await db.collection("esencias").doc(id).update({nombre:nn,imagen:ii});
    cargarEsencias();
  }
}

async function eliminarEsencia(id){
  if(confirm("Eliminar?")){
    await db.collection("esencias").doc(id).delete();
    cargarEsencias();
  }
}

/* ENVASES */
async function crearEnvase(){
  await db.collection("envases").add({
    nombre:nombreEnvase.value,
    categoria:categoria.value,
    imagen:imgEnvase.value,
    precio:parseFloat(precioEnvase.value)||0
  });
  cargarEnvases();
}

async function cargarEnvases(){
  lista.innerHTML="";
  const snap = await db.collection("envases").get();
  snap.forEach(doc=>{
    const d = doc.data();
    lista.innerHTML+=`
    <div class="card">
      ${d.nombre} (${d.categoria})<br>
      Precio: $${d.precio}<br>
      <img src="${d.imagen}" width="100"><br>
      <button onclick="editarEnvase('${doc.id}','${d.nombre}','${d.categoria}','${d.imagen}',${d.precio})">Editar</button>
      <button onclick="eliminarEnvase('${doc.id}')">Eliminar</button>
    </div>`;
  });
}

async function editarEnvase(id,n,c,i,p){
  const nn = prompt("Nombre:",n);
  const cc = prompt("Categoria:",c);
  const ii = prompt("Imagen:",i);
  const pp = parseFloat(prompt("Precio:",p))||0;
  if(nn && cc && ii){
    await db.collection("envases").doc(id).update({nombre:nn,categoria:cc,imagen:ii,precio:pp});
    cargarEnvases();
  }
}

async function eliminarEnvase(id){
  if(confirm("Eliminar?")){
    await db.collection("envases").doc(id).delete();
    cargarEnvases();
  }
}

/* POLITICAS */
let editId=null;

async function guardarPolitica(){
  const titulo = document.getElementById("titulo").value;
  const contenido = document.getElementById("editor").innerHTML;

  if(editId){
    await db.collection("politicas").doc(editId).update({titulo,contenido});
    editId=null;
  }else{
    await db.collection("politicas").add({titulo,contenido});
  }

  document.getElementById("editor").innerHTML="";
  cargarPoliticas();
}

async function cargarPoliticas(){
  lista.innerHTML="";
  const snap = await db.collection("politicas").get();
  snap.forEach(doc=>{
    const d = doc.data();
    lista.innerHTML+=`
    <div class="card">
      <h3>${d.titulo}</h3>
      ${d.contenido}<br>
      <button onclick="editarPolitica('${doc.id}')">Editar</button>
      <button onclick="eliminarPolitica('${doc.id}')">Eliminar</button>
    </div>`;
  });
}

async function editarPolitica(id){
  const doc = await db.collection("politicas").doc(id).get();
  const d = doc.data();
  document.getElementById("titulo").value = d.titulo;
  document.getElementById("editor").innerHTML = d.contenido;
  editId=id;
}

async function eliminarPolitica(id){
  if(confirm("Eliminar política?")){
    await db.collection("politicas").doc(id).delete();
    cargarPoliticas();
  }
}

/* LOGOUT */
function logout(){
  firebase.auth().signOut().then(()=>{
    localStorage.clear();
    window.location.href="login.html";
  });
}

/* INIT */
mostrar("esencias");
</script>

</body>
</html>
