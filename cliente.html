<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfumería</title>

<style>
:root{
  --accent:#10b981;
  --accent2:#34d399;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',system-ui;
  background:var(--bg);
}

/* CONTENEDOR */
.container{
  padding:12px;
  padding-bottom:120px; /* espacio para resumen fijo */
}

/* TITULOS */
h2{
  font-size:18px;
  margin:20px 0 10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:10px;
  border:1px solid #e2e8f0;
}

.card.active{
  border:2px solid var(--accent);
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

.card h4{
  font-size:13px;
  margin:6px 0;
}

.price{
  font-size:13px;
  color:var(--accent);
  font-weight:600;
}

/* BOTONES */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:14px;
}

.btn-main{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:600;
}

.btn-option{
  flex:1;
  background:white;
  border:1px solid #e2e8f0;
}

.btn-option.active{
  border:2px solid var(--accent);
  background:#ecfdf5;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e2e8f0;
  margin:8px 0;
}

/* DURACION */
.row{
  display:flex;
  gap:10px;
}

/* RESUMEN FIJO ABAJO */
.right{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:white;
  padding:12px;
  border-top:1px solid #e2e8f0;
  box-shadow:0 -5px 20px rgba(0,0,0,0.08);
}

.resumen-scroll{
  max-height:120px;
  overflow-y:auto;
}

.resumen-item{
  font-size:12px;
  margin-bottom:6px;
}

.total{
  font-size:18px;
  font-weight:bold;
  color:var(--accent);
  margin:5px 0;
}

/* BOTON VOLVER */
.volver{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#e2e8f0;
}
</style>
</head>

<body>

<div class="container">

<button onclick="volver()" class="volver">← Volver</button>

<h2>Envase</h2>
<div class="grid" id="envases"></div>

<h2>Esencia</h2>
<div class="grid" id="esencias"></div>

<h2>Duración</h2>
<div class="row">
<button class="btn btn-option" onclick="setDuracionUI(this,'moderada')">Moderada</button>
<button class="btn btn-option" onclick="setDuracionUI(this,'alta')">Alta</button>
</div>

<h2>Datos</h2>
<input id="cliente" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">

<button class="btn btn-main" onclick="agregar()">Añadir</button>

</div>

<!-- RESUMEN -->
<div class="right">

<div class="resumen-scroll" id="lista"></div>

<div class="total" id="totalHTML">Total: $0</div>

<button class="btn btn-main" onclick="confirmar()">Confirmar</button>

<div id="whatsapp"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSy...",projectId:"perfumeria-app"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let envase=null;
let esencia=null;
let duracion="moderada";
let carrito=[];

function setActiveCard(container,el){
document.querySelectorAll('#'+container+' .card').forEach(c=>c.classList.remove('active'));
el.classList.add('active');
}

function setDuracionUI(btn,val){
duracion=val;
document.querySelectorAll('.btn-option').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

async function cargarDatos(){

envases.innerHTML="";
esencias.innerHTML="";

let env=await db.collection("envases").get();
env.forEach(doc=>{
let d=doc.data();
envases.innerHTML+=`
<div class="card" onclick="envSel(this,${JSON.stringify(d).replace(/"/g,'&quot;')})">
<img src="${d.imagen}">
<h4>${d.nombre}</h4>
<div class="price">$${d.precio}</div>
</div>`;
});

let es=await db.collection("esencias").get();
es.forEach(doc=>{
let d=doc.data();
esencias.innerHTML+=`
<div class="card" onclick="esSel(this,'${d.nombre}')">
<img src="${d.imagen}">
<h4>${d.nombre}</h4>
</div>`;
});

}

cargarDatos();

function envSel(el,d){envase=d;setActiveCard('envases',el);}
function esSel(el,n){esencia=n;setActiveCard('esencias',el);}

function calcularPrecio(){
if(!envase)return 0;
return Number(envase.precio||0)+(duracion==="alta"?2:1);
}

function agregar(){
if(!envase||!esencia){alert("Selecciona");return;}

let precio=calcularPrecio();

carrito.push({envase:envase.nombre,esencia,duracion,precio});
render();
}

function render(){
lista.innerHTML="";
let total=0;

carrito.forEach(p=>{
total+=p.precio;

lista.innerHTML+=`
<div class="resumen-item">
${p.envase} - ${p.esencia} ($${p.precio})
</div>`;
});

totalHTML.innerText="Total: $"+total;
}

async function confirmar(){

if(carrito.length===0){alert("Agrega");return;}
if(!cliente.value || !telefono.value){alert("Completa");return;}

let total = carrito.reduce((a,b)=>a+b.precio,0);

await db.collection("pedidos").add({
cliente:cliente.value,
telefono:telefono.value,
carrito,
total,
estado:"pendiente",
fecha:new Date().toISOString()
});

let mensaje = `Pedido\n${cliente.value}\n${telefono.value}\nTotal: $${total}`;

let url = "https://wa.me/593969518798?text=" + encodeURIComponent(mensaje);

whatsapp.innerHTML = `
<a href="${url}" target="_blank">
<button class="btn btn-main">WhatsApp</button>
</a>`;
}

function volver(){
window.location.href="index.html";
}
</script>

</body>
</html>
