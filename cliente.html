<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfumería</title>

<style>
:root{
  --bg:#f8fafc;
  --panel:#ffffff;
  --card:#ffffff;
  --accent:#10b981;
  --accent2:#34d399;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
}

/* BASE */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',system-ui;
  background:linear-gradient(to bottom,#f8fafc,#eef2f7);
  color:var(--text);
}

/* LAYOUT */
.container{display:flex;}

.left{
  width:70%;
  padding:40px;
}

.right{
  width:30%;
  position:fixed;
  right:0;
  top:0;
  height:100%;
  padding:30px;
  background:#ffffffcc;
  backdrop-filter: blur(10px);
  border-left:1px solid var(--border);
}

/* TITULOS */
h2{
  font-weight:600;
  margin:30px 0 12px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  cursor:pointer;
  transition:.25s;
  position:relative;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card.active{
  border:1px solid var(--accent);
  box-shadow:0 0 0 2px rgba(16,185,129,.2);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

.card h4{
  margin:10px 0 5px;
}

.price{
  color:var(--accent);
  font-weight:600;
}

/* BOTONES */
.btn{
  padding:16px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-size:18px;
}

.btn-main{
  width:100%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:600;
  box-shadow:0 10px 25px rgba(16,185,129,.25);
}

.btn-main:hover{
  transform:translateY(-2px);
}

.btn-option{
  background:#f1f5f9;
  border:1px solid var(--border);
  color:#0f172a;
  margin-right:12px;
  font-size:18px;
  padding:14px;
}

.btn-option.active{
  border:1px solid var(--accent);
  background:#ecfdf5;
}

/* INPUT */
input{
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:white;
  color:#0f172a;
  margin:10px 0;
  font-size:18px;
}

input:focus{
  outline:none;
  border:1px solid var(--accent);
}

/* RESUMEN */
.resumen-item{
  background:#f8fafc;
  border:1px solid var(--border);
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  font-size:16px;
}

.total{
  font-size:26px;
  font-weight:700;
  color:var(--accent);
}

/* BOTON VOLVER */
.volver{
  margin-bottom:20px;
  padding:14px 20px;
  border-radius:12px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
  font-size:18px;
}

.volver:hover{
  background:#f1f5f9;
}

/* NOTA */
.note{
  font-size:14px;
  color:var(--muted);
}

/* AJUSTES CELULAR - SOLO MÓVIL */
@media (max-width:768px){
  .container { flex-direction: column; }
  .left, .right { width:100%; position:relative; padding:20px; }
  h2 { font-size:24px; margin:20px 0 12px; }
  input { font-size:20px; padding:18px; }
  .btn, .btn-main, .btn-option, .volver { font-size:20px; padding:18px; margin-bottom:14px; }
  .resumen-item { font-size:18px; padding:16px; }
  .total { font-size:24px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }
  .card img { height:160px; }
  .card h4 { font-size:18px; }
}
</style>
</head>

<body>

<div class="container">

<div class="left">

<button onclick="volver()" class="volver">
← Volver a tienda
</button>

<h2>Selecciona Envase</h2>
<div class="grid" id="envases"></div>

<h2>Selecciona Esencia</h2>
<div class="grid" id="esencias"></div>

<h2>Duración</h2>
<button class="btn btn-option" onclick="setDuracionUI(this,'moderada')">Moderada</button>
<button class="btn btn-option" onclick="setDuracionUI(this,'alta')">Alta</button>

<h2>Datos</h2>
<input id="cliente" placeholder="Tu nombre">
<input id="telefono" placeholder="Teléfono">

<button class="btn btn-main" onclick="agregar()">Añadir al pedido</button>

</div>

<div class="right">

<h2>Resumen</h2>
<p class="note">El costo del envío es aparte</p>

<div id="lista"></div>

<div class="total" id="totalHTML">Total: $0</div>

<button class="btn btn-main" onclick="confirmar()">Confirmar pedido</button>

<div id="whatsapp"></div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSy...",projectId:"perfumeria-app"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let envase=null;
let esencia=null;
let duracion="moderada";
let carrito=[];

/* UI */
function setActiveCard(container,el){
document.querySelectorAll('#'+container+' .card').forEach(c=>c.classList.remove('active'));
el.classList.add('active');
}

function setDuracionUI(btn,val){
duracion=val;
document.querySelectorAll('.btn-option').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

/* LOAD */
async function cargarDatos(){

envases.innerHTML="";
esencias.innerHTML="";

let env=await db.collection("envases").get();
env.forEach(doc=>{
let d=doc.data();
envases.innerHTML+=`
<div class="card" onclick="envSel(this,${JSON.stringify(d).replace(/"/g,'&quot;')})">
<img src="${d.imagen}">
<h4>${d.nombre}</h4>
<p>${d.categoria}</p>
<div class="price">$${d.precio}</div>
</div>`;
});

let es=await db.collection("esencias").get();
es.forEach(doc=>{
let d=doc.data();
esencias.innerHTML+=`
<div class="card" onclick="esSel(this,'${d.nombre}')">
<img src="${d.imagen}">
<h4>${d.nombre}</h4>
</div>`;
});

}

cargarDatos();

function envSel(el,d){envase=d;setActiveCard('envases',el);}
function esSel(el,n){esencia=n;setActiveCard('esencias',el);}

function calcularPrecio(){
if(!envase)return 0;
return Number(envase.precio||0)+(duracion==="alta"?2:1);
}

function agregar(){

if(!envase||!esencia){alert("Selecciona");return;}

let precio=calcularPrecio();

carrito.push({
envase:envase.nombre,
esencia,
duracion,
precio,
cantidad:1
});

render();
}

function render(){
lista.innerHTML="";
let total=0;

carrito.forEach(p=>{
total+=p.precio;

lista.innerHTML+=`
<div class="resumen-item">
<b>${p.envase}</b> - ${p.esencia}<br>
${p.duracion}<br>
<span style="color:#10b981">$${p.precio}</span>
</div>`;
});

totalHTML.innerText="Total: $"+total;
}

async function confirmar(){

  if(carrito.length===0){
    alert("Agrega");
    return;
  }

  let total = carrito.reduce((a,b)=>a+b.precio,0);

  await db.collection("pedidos").add({
    cliente:cliente.value,
    telefono:telefono.value,
    carrito,
    total,
    estado:"pendiente",
    fecha:new Date().toISOString()
  });

  let mensaje = `Pedido%0A`;
  mensaje += `Nombre: ${cliente.value}%0A`;
  mensaje += `Numero: ${telefono.value}%0A%0A`;

  carrito.forEach(p=>{
    mensaje += `Envase: ${p.envase}%0A`;
    mensaje += `Esencia: ${p.esencia}%0A`;
    mensaje += `Duración: ${p.duracion}%0A`;
    mensaje += `Precio: $${p.precio}%0A`;
    mensaje += `--------------------%0A`;
  });

  mensaje += `%0ATotal: $${total}`;

  whatsapp.innerHTML = `
  <a href="https://wa.me/593969518798?text=${mensaje}" target="_blank">
    <button class="btn btn-main">Enviar por WhatsApp</button>
  </a>`;
}

whatsapp.innerHTML=`
<a href="https://wa.me/593969518798?text=Pedido $0" target="_blank">
<button class="btn btn-main">Ir a WhatsApp</button>
</a>`;

function volver(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
