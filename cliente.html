<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfumería</title>

<style>
:root{
  --bg:#f8fafc;
  --panel:#ffffff;
  --card:#ffffff;
  --accent:#10b981;
  --accent2:#34d399;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
}

/* BASE */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',system-ui;
  background:linear-gradient(to bottom,#f8fafc,#eef2f7);
  color:var(--text);
}

/* LAYOUT */
.container{
  display:flex;
  flex-wrap:nowrap;
}

.left{
  width:70%;
  padding:40px;
}

.right{
  width:30%;
  position:fixed;
  right:0;
  top:0;
  height:100%;
  padding:30px;
  background:#ffffffcc;
  backdrop-filter: blur(10px);
  border-left:1px solid var(--border);
}

/* TITULOS */
h2{
  font-weight:600;
  margin:30px 0 12px;
  font-size:22px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  cursor:pointer;
  transition:.25s;
  position:relative;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card.active{
  border:1px solid var(--accent);
  box-shadow:0 0 0 2px rgba(16,185,129,.2);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.card h4{
  margin:10px 0 5px;
  font-size:16px;
}

.price{
  color:var(--accent);
  font-weight:600;
  font-size:15px;
}

/* BOTONES */
.btn{
  padding:14px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-size:16px;
}

.btn-main{
  width:100%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:600;
  box-shadow:0 8px 20px rgba(16,185,129,.2);
}

.btn-main:hover{
  transform:translateY(-2px);
}

.btn-option{
  background:#f1f5f9;
  border:1px solid var(--border);
  color:#0f172a;
  margin-right:10px;
  font-size:16px;
  padding:12px 15px;
}

.btn-option.active{
  border:1px solid var(--accent);
  background:#ecfdf5;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:white;
  color:#0f172a;
  margin:8px 0;
  font-size:16px;
}

input:focus{
  outline:none;
  border:1px solid var(--accent);
}

/* RESUMEN */
.resumen-item{
  background:#f8fafc;
  border:1px solid var(--border);
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  font-size:15px;
}

.total{
  font-size:22px;
  font-weight:700;
  color:var(--accent);
}

/* BOTON VOLVER */
.volver{
  margin-bottom:20px;
  padding:12px 18px;
  border-radius:12px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
  font-size:16px;
}

.volver:hover{
  background:#f1f5f9;
}

/* NOTA */
.note{
  font-size:13px;
  color:var(--muted);
}

/* RESPONSIVE TOTAL */
@media (max-width: 1024px){
  .container{
    flex-direction:column;
  }

  .left{
    width:100%;
    padding:20px;
  }

  .right{
    width:100%;
    position:relative;
    border-left:none;
    border-top:1px solid var(--border);
    height:auto;
    padding:20px;
    margin-top:20px;
  }

  .grid{
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
  }

  .card img{
    height:130px;
  }

  .btn, .btn-main, .btn-option{
    width:100%;
  }
}

@media (max-width: 768px){
  h2{
    font-size:18px;
  }

  input{
    font-size:15px;
    padding:12px;
  }

  .card img{
    height:120px;
  }

  .card h4{
    font-size:15px;
  }

  .resumen-item{
    padding:10px;
    font-size:14px;
  }

  .total{
    font-size:20px;
  }

  .btn, .btn-main, .btn-option, .volver{
    font-size:17px;
    padding:14px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="left">

<button onclick="volver()" class="volver">
← Volver a tienda
</button>

<h2>Selecciona Envase</h2>
<div class="grid" id="envases"></div>

<h2>Selecciona Esencia</h2>
<div class="grid" id="esencias"></div>

<h2>Duración</h2>
<button class="btn btn-option" onclick="setDuracionUI(this,'moderada')">Moderada</button>
<button class="btn btn-option" onclick="setDuracionUI(this,'alta')">Alta</button>

<h2>Datos</h2>
<input id="cliente" placeholder="Tu nombre">
<input id="telefono" placeholder="Teléfono">

<button class="btn btn-main" onclick="agregar()">Añadir al pedido</button>

</div>

<div class="right">

<h2>Resumen</h2>
<p class="note">El costo del envío es aparte</p>

<div id="lista"></div>

<div class="total" id="totalHTML">Total: $0</div>

<button class="btn btn-main" onclick="confirmar()">Confirmar pedido</button>

<div id="whatsapp"></div>

</div>

</div>

</body>
</html>
