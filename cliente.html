<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfumería</title>

<style>
:root{
  --bg:#f8fafc;
  --panel:#ffffff;
  --card:#ffffff;
  --accent:#10b981;
  --accent2:#34d399;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
}

*{
  box-sizing:border-box;
  transition: all .2s ease;
}

body{
  margin:0;
  font-family:'Segoe UI',system-ui;
  background:linear-gradient(to bottom,#f8fafc,#eef2f7);
  color:var(--text);
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.left{
  width:65%;
  padding:20px;
  max-height:100vh;
  overflow-y:auto;
}

.right{
  width:35%;
  position:sticky;
  top:20px;
  height:fit-content;
  padding:20px;
  background:#ffffffcc;
  backdrop-filter: blur(10px);
  border:1px solid var(--border);
  border-radius:16px;
}

/* MOBILE */
@media(max-width:900px){
  .container{
    flex-direction:column;
    padding:10px;
  }

  .left,.right{
    width:100%;
    padding:15px;
  }

  .right{
    position:relative;
    top:auto;
  }
}

/* TITULOS */
h2{
  font-weight:600;
  margin:25px 0 10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}

@media(max-width:500px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card.active{
  border:1px solid var(--accent);
  box-shadow:0 0 0 2px rgba(16,185,129,.2);
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:12px;
}

.card h4{
  font-size:14px;
  margin:8px 0 4px;
}

.price{
  font-size:14px;
  color:var(--accent);
  font-weight:600;
}

/* BOTONES */
.btn{
  padding:12px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-size:14px;
}

.btn-main{
  width:100%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:600;
  box-shadow:0 6px 16px rgba(16,185,129,.2);
}

.btn-option{
  background:#f1f5f9;
  border:1px solid var(--border);
  color:#0f172a;
  margin-right:10px;
  border-radius:999px;
}

.btn-option.active{
  border:1px solid var(--accent);
  background:#ecfdf5;
}

/* INPUT */
input{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:1px solid var(--border);
  margin:6px 0;
  font-size:14px;
}

input:focus{
  outline:none;
  border:1px solid var(--accent);
}

/* RESUMEN */
.resumen-item{
  background:#f8fafc;
  border:1px solid var(--border);
  padding:10px;
  border-radius:12px;
  margin-bottom:8px;
  font-size:13px;
}

.total{
  font-size:22px;
  font-weight:700;
  color:var(--accent);
}

/* VOLVER */
.volver{
  margin-bottom:20px;
  padding:10px 18px;
  border-radius:10px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
}

/* NOTE */
.note{
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<div class="left">

<button onclick="volver()" class="volver">
← Volver a tienda
</button>

<h2>Selecciona Envase</h2>
<div class="grid" id="envases"></div>

<h2>Selecciona Esencia</h2>
<div class="grid" id="esencias"></div>

<h2>Duración</h2>
<div style="display:flex;gap:10px;margin-bottom:10px;">
<button class="btn btn-option" onclick="setDuracionUI(this,'moderada')">Moderada</button>
<button class="btn btn-option" onclick="setDuracionUI(this,'alta')">Alta</button>
</div>

<h2>Datos</h2>
<input id="cliente" placeholder="Tu nombre">
<input id="telefono" placeholder="Teléfono">

<button class="btn btn-main" onclick="agregar()">Añadir al pedido</button>

</div>

<div class="right">

<h2>Resumen</h2>
<p class="note">El costo del envío es aparte</p>

<div id="lista"></div>

<div class="total" id="totalHTML">Total: $0</div>

<button class="btn btn-main" onclick="confirmar()">Confirmar pedido</button>

<div id="whatsapp"></div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSy...",projectId:"perfumeria-app"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let envase=null;
let esencia=null;
let duracion="moderada";
let carrito=[];

function setActiveCard(container,el){
document.querySelectorAll('#'+container+' .card').forEach(c=>c.classList.remove('active'));
el.classList.add('active');
}

function setDuracionUI(btn,val){
duracion=val;
document.querySelectorAll('.btn-option').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

async function cargarDatos(){

envases.innerHTML="";
esencias.innerHTML="";

let env=await db.collection("envases").get();
env.forEach(doc=>{
let d=doc.data();
envases.innerHTML+=`
<div class="card" onclick="envSel(this,${JSON.stringify(d).replace(/"/g,'&quot;')})">
<img src="${d.imagen}">
<h4>${d.nombre}</h4>
<p>${d.categoria}</p>
<div class="price">$${d.precio}</div>
</div>`;
});

let es=await db.collection("esencias").get();
es.forEach(doc=>{
let d=doc.data();
esencias.innerHTML+=`
<div class="card" onclick="esSel(this,'${d.nombre}')">
<img src="${d.imagen}">
<h4>${d.nombre}</h4>
</div>`;
});

}

cargarDatos();

function envSel(el,d){envase=d;setActiveCard('envases',el);}
function esSel(el,n){esencia=n;setActiveCard('esencias',el);}

function calcularPrecio(){
if(!envase)return 0;
return Number(envase.precio||0)+(duracion==="alta"?2:1);
}

function agregar(){

if(!envase||!esencia){alert("Selecciona");return;}

let precio=calcularPrecio();

carrito.push({
envase:envase.nombre,
esencia,
duracion,
precio,
cantidad:1
});

render();
}

function render(){
lista.innerHTML="";
let total=0;

carrito.forEach(p=>{
total+=p.precio;

lista.innerHTML+=`
<div class="resumen-item">
<b>${p.envase}</b> - ${p.esencia}<br>
${p.duracion}<br>
<span style="color:#10b981">$${p.precio}</span>
</div>`;
});

totalHTML.innerText="Total: $"+total;
}

async function confirmar(){

if(carrito.length===0){alert("Agrega");return;}
if(!cliente.value || !telefono.value){alert("Completa tus datos");return;}

let total = carrito.reduce((a,b)=>a+b.precio,0);

await db.collection("pedidos").add({
cliente:cliente.value,
telefono:telefono.value,
carrito,
total,
estado:"pendiente",
fecha:new Date().toISOString()
});

let mensaje = `Pedido\nNombre: ${cliente.value}\nNumero: ${telefono.value}\n\n`;

carrito.forEach(p=>{
mensaje += `Envase: ${p.envase}\nEsencia: ${p.esencia}\nDuración: ${p.duracion}\nPrecio: $${p.precio}\n--------------------\n`;
});

mensaje += `\nTotal: $${total}`;

let url = "https://wa.me/593969518798?text=" + encodeURIComponent(mensaje);

whatsapp.innerHTML = `
<a href="${url}" target="_blank">
<button class="btn btn-main">Enviar por WhatsApp</button>
</a>`;
}

function volver(){
window.location.href="index.html";
}
</script>

</body>
</html>
